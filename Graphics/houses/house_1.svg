<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 -180 200 200" width="200" height="200">
  <!-- Shadow -->
  <ellipse cx="20" cy="15" rx="90" ry="18" fill="rgba(0,0,0,0.20)"/>
  <!-- Side wall (3D) -->
  <polygon points="100,-120 148,-148 148,-18 100,0" fill="#5a3808"/>
  <!-- Front wall -->
  <rect x="-100" y="-120" width="200" height="120" fill="#8B4513" rx="2"/>
  <!-- Wood planks -->
  <line x1="-100" y1="-100" x2="100" y2="-100" stroke="#6a3410" stroke-width="2"/>
  <line x1="-100" y1="-80" x2="100" y2="-80" stroke="#6a3410" stroke-width="2"/>
  <line x1="-100" y1="-60" x2="100" y2="-60" stroke="#6a3410" stroke-width="2"/>
  <line x1="-100" y1="-40" x2="100" y2="-40" stroke="#6a3410" stroke-width="2"/>
  <line x1="-100" y1="-20" x2="100" y2="-20" stroke="#6a3410" stroke-width="2"/>
  <!-- Door -->
  <path d="M -28,-2 L -28,-68 Q -28,-82 0,-82 Q 28,-82 28,-68 L 28,-2 Z" fill="#3a1a04"/>
  <circle cx="0" cy="-40" r="4" fill="#c8a020"/>
  <!-- Windows -->
  <rect x="-88" y="-105" width="36" height="26" rx="3" fill="#d4eeff" stroke="#5a3808" stroke-width="2"/>
  <rect x="52" y="-105" width="36" height="26" rx="3" fill="#d4eeff" stroke="#5a3808" stroke-width="2"/>
  <line x1="-70" y1="-105" x2="-70" y2="-79" stroke="#5a3808" stroke-width="1.5"/>
  <line x1="-88" y1="-92" x2="-52" y2="-92" stroke="#5a3808" stroke-width="1.5"/>
  <line x1="70" y1="-105" x2="70" y2="-79" stroke="#5a3808" stroke-width="1.5"/>
  <line x1="52" y1="-92" x2="88" y2="-92" stroke="#5a3808" stroke-width="1.5"/>
  <!-- Roof front -->
  <polygon points="-100,-120 100,-120 48,-178 -48,-178" fill="#a00000"/>
  <polygon points="-100,-120 100,-120 48,-178 -48,-178" fill="none" stroke="#800000" stroke-width="3"/>
  <!-- Roof side 3D -->
  <polygon points="100,-120 148,-148 96,-206 48,-178" fill="#800000"/>
  <!-- Roof ridge details -->
  <line x1="-100" y1="-120" x2="100" y2="-120" stroke="#800000" stroke-width="3"/>
  <!-- Chimney -->
  <rect x="30" y="-195" width="22" height="40" fill="#8a5535" rx="2"/>
  <rect x="26" y="-198" width="30" height="6" fill="#9a6545" rx="1"/>
  <!-- Slot indicators row (drawn by game code) -->
</svg>