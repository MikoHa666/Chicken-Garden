<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -105 155 128" width="155" height="128">
  <!-- ground shadow -->
  <ellipse cx="4" cy="16" rx="36" ry="9" fill="rgba(0,0,0,0.22)"/>

  <!-- ═══ HUGE BRIGHT-RED RUMP — sits high and proud, clearly different from chicken ═══ -->
  <!-- Rump glow / base -->
  <ellipse cx="44" cy="-38" rx="34" ry="30" fill="#ee1010" opacity="0.28"/>
  <!-- Main rump mass — bright red, high up -->
  <ellipse cx="42" cy="-42" rx="30" ry="26" fill="#ee1010"/>
  <!-- Rump highlight (lighter top) -->
  <ellipse cx="36" cy="-52" rx="16" ry="11" transform="rotate(-15,36,-52)" fill="rgba(255,180,180,0.40)"/>
  <!-- Rump shadow underside -->
  <ellipse cx="46" cy="-30" rx="22" ry="12" transform="rotate(10,46,-30)" fill="#dd0000" opacity="0.65"/>

  <!-- ═══ BIG FAN TAIL — sweeping up and back from rump ═══ -->
  <path d="M 58,-38 Q 122,-115 88,-22" fill="#2a0c04" stroke="#2a0c04" stroke-width="1"/>
  <path d="M 56,-44 Q 116,-108 82,-28" fill="#2a0c04" stroke="#2a0c04" stroke-width="1"/>
  <path d="M 54,-50 Q 105,-118 76,-36" fill="#2a0c04" stroke="#2a0c04" stroke-width="1"/>
  <path d="M 60,-32 Q 122,-88  90,-14" fill="#2a0c04" stroke="#2a0c04" stroke-width="1"/>
  <path d="M 62,-26 Q 118,-65  90,-6"  fill="#2a0c04" stroke="#2a0c04" stroke-width="1"/>
  <!-- feather shaft lines on tail -->
  <line x1="62" y1="-28" x2="95" y2="-55" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>
  <line x1="58" y1="-40" x2="88" y2="-72" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>

  <!-- ═══ SLIM UPRIGHT BODY ═══ -->
  <ellipse cx="8" cy="-22" rx="20" ry="28" fill="#5a2e18"/>
  <!-- body shadow -->
  <ellipse cx="16" cy="-22" rx="13" ry="20" transform="rotate(-5,16,-22)" fill="#3e1e08"/>
  <!-- chest sheen -->
  <ellipse cx="0"  cy="-30" rx="11" ry="8"  transform="rotate(12,0,-30)"  fill="rgba(255,255,255,0.10)"/>

  <!-- Saddle hackles connecting body to rump -->
  <ellipse cx="22" cy="-40" rx="3"   ry="10" transform="rotate(-18,22,-40)" fill="#b04000"/>
  <ellipse cx="28" cy="-44" rx="3"   ry="10" transform="rotate(-12,28,-44)" fill="#b04000"/>
  <ellipse cx="34" cy="-46" rx="2.8" ry="9"  transform="rotate(-6,34,-46)"  fill="#b04000"/>

  <!-- ═══ NECK + HEAD ═══ -->
  <ellipse cx="-10" cy="-46" rx="10" ry="14" fill="#5a2e18"/>
  <!-- neck hackle feathers -->
  <ellipse cx="-8" cy="-38" rx="2.2" ry="7" transform="rotate(-8,-8,-38)"  fill="#b04000"/>
  <ellipse cx="-4" cy="-36" rx="2.2" ry="7" transform="rotate(-2,-4,-36)"  fill="#b04000"/>
  <ellipse cx="0"  cy="-36" rx="2.2" ry="7" transform="rotate(4,0,-36)"    fill="#b04000"/>
  <!-- head -->
  <ellipse cx="-12" cy="-63" rx="15" ry="14" fill="#5a2e18"/>

  <!-- comb -->
  <ellipse cx="-21" cy="-77" rx="4.2" ry="7.5"  fill="#ee1010"/>
  <ellipse cx="-14" cy="-80" rx="4.5" ry="8.5"  fill="#ee1010"/>
  <ellipse cx="-7"  cy="-79" rx="4.5" ry="8"    fill="#ee1010"/>
  <ellipse cx="0"   cy="-76" rx="4"   ry="7"    fill="#ee1010"/>

  <!-- wattle -->
  <ellipse cx="-26" cy="-58" rx="5.5" ry="8" fill="#dd0000"/>

  <!-- eye -->
  <circle cx="-5"  cy="-64" r="5"   fill="white"/>
  <circle cx="-4"  cy="-64" r="2.8" fill="#111"/>
  <circle cx="-3.2" cy="-65.3" r="1.1" fill="white"/>

  <!-- beak -->
  <polygon points="-26,-61 -40,-57 -26,-53" fill="#d09010"/>

  <!-- ═══ LEGS with spurs ═══ -->
  <line x1="-2"  y1="0" x2="-5"  y2="16" stroke="#a06008" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="10"  y1="0" x2="13"  y2="16" stroke="#a06008" stroke-width="4.5" stroke-linecap="round"/>
  <!-- spurs -->
  <line x1="-4"  y1="6" x2="-14" y2="1"  stroke="#a06008" stroke-width="2.4" stroke-linecap="round"/>
  <!-- toes -->
  <line x1="-5"  y1="16" x2="-16" y2="23" stroke="#a06008" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="-5"  y1="16" x2="-5"  y2="25" stroke="#a06008" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="-5"  y1="16" x2="4"   y2="23" stroke="#a06008" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="13"  y1="16" x2="4"   y2="23" stroke="#a06008" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="13"  y1="16" x2="13"  y2="25" stroke="#a06008" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="13"  y1="16" x2="22"  y2="23" stroke="#a06008" stroke-width="2.8" stroke-linecap="round"/>
</svg>